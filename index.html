<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Follower 變動追蹤器 Pro+ (v1.1.0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-unfollowed-text { 
            color: #b91c1c; 
            text-decoration: line-through; 
            opacity: 0.7;
        }
        tr { transition: background-color 0.2s ease; }
        tr:hover { filter: brightness(0.96); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .sort-icon::after { content: ' ↕'; opacity: 0.3; font-size: 0.8em; margin-left: 4px; }
        .sort-asc::after { content: ' ↑'; opacity: 1; color: #2563eb; }
        .sort-desc::after { content: ' ↓'; opacity: 1; color: #2563eb; }
        
        th { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        th:hover { background-color: #f1f5f9; }

        .avatar-img { 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: zoom-in;
        }
        .avatar-img:hover { transform: scale(1.15); }

        /* Lightbox 遮罩樣式 */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
        }
        #lightbox img {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 6px solid white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            object-fit: cover;
            cursor: default;
            transition: transform 0.3s ease;
        }
        #lightbox.active { display: flex; animation: fadeIn 0.3s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900">

    <!-- 圖片放大遮罩 (Lightbox) -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="放大頭像" onclick="event.stopPropagation()">
        <button class="mt-8 bg-white/20 hover:bg-white/40 text-white p-3 rounded-full transition" onclick="closeLightbox()">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <div class="max-w-7xl mx-auto px-4 pt-8">
        <!-- 頁首與統計 -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight flex items-center">
                    <svg class="w-8 h-8 mr-2 text-pink-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    IG TRACKER PRO+
                </h1>
                <div class="flex flex-col">
                    <p class="text-slate-500 font-medium text-sm">專業追蹤分析工具</p>
                    <p class="text-slate-400 font-mono text-[10px] mt-0.5 uppercase tracking-widest">Version: 1.1.0</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 text-center min-w-[130px]">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-tighter">追蹤中</div>
                    <div id="activeCount" class="text-2xl font-black text-blue-600">0</div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 text-center min-w-[130px]">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-tighter">已退追</div>
                    <div id="lostCount" class="text-2xl font-black text-red-500">0</div>
                </div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8 no-print">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-slate-700 flex items-center">
                    <span class="w-2 h-6 bg-blue-600 rounded-full mr-3"></span>
                    名單更新
                </h2>
                <div class="flex gap-2">
                    <button onclick="generateMockData()" class="bg-amber-50 text-amber-600 hover:bg-amber-100 px-4 py-2 rounded-xl text-xs font-bold transition border border-amber-100">
                        🧪 模擬測試數據
                    </button>
                    <button onclick="exportJSON()" class="bg-white text-slate-600 hover:bg-slate-50 px-4 py-2 rounded-xl text-sm font-bold transition border border-slate-200 shadow-sm">
                        💾 導出備份
                    </button>
                    <input type="file" id="fileImport" class="hidden" accept=".json" onchange="importBackup(this)">
                    <button onclick="document.getElementById('fileImport').click()" class="bg-white text-slate-600 hover:bg-slate-50 px-4 py-2 rounded-xl text-sm font-bold transition border border-slate-200 shadow-sm">
                        📁 導入備份
                    </button>
                </div>
            </div>

            <div class="mb-4">
                <textarea id="jsonInput" 
                    class="w-full h-24 p-4 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition font-mono text-sm bg-slate-50" 
                    placeholder='貼上 followers.json 的內容...'></textarea>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <button onclick="processData()" class="bg-slate-900 hover:bg-slate-800 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-slate-200">
                    🔍 更新名單
                </button>
                <div class="flex-1 text-right pr-4">
                    <span id="localStatus" class="text-[10px] text-slate-400 uppercase font-bold tracking-widest italic font-mono"></span>
                </div>
                <button onclick="clearAll()" class="text-red-400 hover:text-red-500 text-xs font-bold">
                    清空緩存
                </button>
            </div>
            <div id="msg" class="mt-4 p-4 rounded-xl text-sm hidden"></div>
        </div>

        <!-- 過濾與搜尋 -->
        <div class="flex flex-col md:flex-row gap-4 mb-4 no-print items-center">
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-1">
                <button onclick="setFilter('all')" id="filter-all" class="filter-btn px-5 py-2.5 rounded-xl text-sm font-bold bg-slate-800 text-white shadow-sm whitespace-nowrap">全部</button>
                <button onclick="setFilter('new')" id="filter-new" class="filter-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 whitespace-nowrap">新加入</button>
                <button onclick="setFilter('unfollowed')" id="filter-unfollowed" class="filter-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 whitespace-nowrap">已退追</button>
            </div>
            <div class="relative w-full md:flex-1">
                <input type="text" id="searchInput" oninput="render()" placeholder="搜尋帳號..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none text-sm">
            </div>
        </div>

        <!-- 數據表格 -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th onclick="toggleSort('name')" id="th-name" class="p-5 font-bold text-slate-600 sort-icon min-w-[150px]">帳號</th>
                            <th onclick="toggleSort('status')" id="th-status" class="p-5 font-bold text-slate-600 sort-icon">狀態</th>
                            <th onclick="toggleSort('time')" id="th-time" class="p-5 font-bold text-slate-600 sort-icon min-w-[220px]">追蹤 / 退追日期</th>
                            <th class="p-5 font-bold text-slate-600 text-center">工具</th>
                            <th class="p-5 font-bold text-slate-600">系統備註</th>
                        </tr>
                    </thead>
                    <tbody id="listBody" class="divide-y divide-slate-100 text-sm">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ig_tracker_v7_data')) || {};
        let currentFilter = 'all';
        let sortConfig = { key: 'time', direction: 'desc' };

        function save() {
            localStorage.setItem('ig_tracker_v7_data', JSON.stringify(db));
            render();
            updateLocalStatus();
        }

        function updateLocalStatus() {
            const hasData = Object.keys(db).length > 0;
            document.getElementById('localStatus').innerText = hasData ? "資料已同步至瀏覽器" : "無本地緩存";
        }

        function formatFullTime(ts) {
            if(!ts) return "--";
            const d = new Date(ts * 1000);
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        function toggleSort(key) {
            if(sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }
            render();
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 transition-all whitespace-nowrap";
            });
            document.getElementById(`filter-${type}`).className = "filter-btn px-5 py-2.5 rounded-xl text-sm font-bold bg-slate-800 text-white shadow-sm transition-all whitespace-nowrap";
            render();
        }

        function openLightbox(url) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = url;
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function processData() {
            const input = document.getElementById('jsonInput').value.trim();
            if(!input) return;

            try {
                let parsed = JSON.parse(input);
                let rawList = Array.isArray(parsed) ? parsed : (parsed.relationships_followers || []);
                const todayTs = Math.floor(Date.now() / 1000);
                
                const currentMap = new Map();
                rawList.forEach(item => {
                    const data = item.string_list_data[0];
                    if(data && data.value) {
                        currentMap.set(data.value, {
                            href: data.href || `https://www.instagram.com/${data.value}/`,
                            timestamp: data.timestamp || todayTs
                        });
                    }
                });

                currentMap.forEach((val, user) => {
                    if (!db[user]) {
                        db[user] = { 
                            ...val, 
                            status: 'new', 
                            followTs: val.timestamp, 
                            updateTs: todayTs,       
                            note: '新發現的追蹤者' 
                        };
                    } else if (db[user].status === 'unfollowed') {
                        db[user].status = 'new';
                        db[user].updateTs = todayTs;
                        db[user].note = '重新追蹤了你';
                    } else {
                        db[user].status = 'active';
                        db[user].href = val.href;
                    }
                });

                for (let user in db) {
                    if (db[user].status !== 'unfollowed' && !currentMap.has(user)) {
                        db[user].status = 'unfollowed';
                        db[user].updateTs = todayTs; 
                        db[user].note = '數據消失 (退追)';
                    }
                }

                document.getElementById('jsonInput').value = "";
                save();
                showMsg("✅ 名單已完成更新！", "ok");
            } catch(e) { 
                showMsg("❌ 解析錯誤，請檢查 JSON 內容。", "err");
            }
        }

        function showMsg(text, type) {
            const m = document.getElementById('msg');
            m.innerText = text;
            m.className = `mt-4 p-4 rounded-xl text-sm font-bold block ${type === 'err' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-blue-50 text-blue-700 border border-blue-100'}`;
            setTimeout(() => { m.classList.add('hidden'); }, 5000);
        }

        function generateMockData() {
            const now = Math.floor(Date.now() / 1000);
            db = {
                "instagram": { status: "active", followTs: now-864000, updateTs: now-864000, href: "https://www.instagram.com/instagram/", note: "官方帳號" },
                "zuck": { status: "new", followTs: now, updateTs: now, href: "https://www.instagram.com/zuck/", note: "模擬新加入" },
                "leomessi": { status: "active", followTs: now-500000, updateTs: now-500000, href: "https://www.instagram.com/leomessi/", note: "模擬追蹤者" },
                "test_user": { status: "unfollowed", followTs: now-200000, updateTs: now-500, href: "#", note: "模擬退追" }
            };
            save();
            showMsg("🧪 已載入模擬測試數據", "ok");
        }

        function render() {
            const body = document.getElementById('listBody');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            body.innerHTML = "";
            
            document.querySelectorAll('th').forEach(th => th.className = th.className.replace(/sort-asc|sort-desc/g, '').trim());
            const activeTh = document.getElementById(`th-${sortConfig.key}`);
            if(activeTh) activeTh.classList.add(sortConfig.direction === 'asc' ? 'sort-asc' : 'sort-desc');

            let keys = Object.keys(db).filter(u => {
                const info = db[u];
                if (currentFilter === 'new' && info.status !== 'new') return false;
                if (currentFilter === 'unfollowed' && info.status !== 'unfollowed') return false;
                if (searchQuery && !u.toLowerCase().includes(searchQuery)) return false;
                return true;
            });

            keys.sort((a, b) => {
                let vA, vB;
                if(sortConfig.key === 'name') { vA = a; vB = b; }
                else if(sortConfig.key === 'status') {
                    const m = { 'new': 0, 'unfollowed': 1, 'active': 2 };
                    vA = m[db[a].status]; vB = m[db[b].status];
                } else if(sortConfig.key === 'time') { 
                    if (currentFilter === 'unfollowed') {
                        vA = db[a].updateTs || 0; vB = db[b].updateTs || 0;
                    } else {
                        vA = db[a].followTs || 0; vB = db[b].followTs || 0;
                    }
                }
                return sortConfig.direction === 'asc' ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
            });

            let activeCount = 0, lostCount = 0;
            Object.keys(db).forEach(u => { if(db[u].status !== 'unfollowed') activeCount++; else lostCount++; });

            keys.forEach(u => {
                const info = db[u];
                const tr = document.createElement('tr');
                if (info.status === 'new') tr.style.backgroundColor = '#ecfdf5';
                else if (info.status === 'unfollowed') tr.style.backgroundColor = '#fef2f2';

                const avatarUrl = `https://unavatar.io/instagram/${u}?fallback=https://ui-avatars.com/api/?name=${u}&background=random`;
                const storyUrl = `https://www.storysaver.net/en`;
                const followTime = formatFullTime(info.followTs);
                const updateTime = info.status === 'unfollowed' ? formatFullTime(info.updateTs) : "N/A";

                tr.innerHTML = `
                    <td class="p-4 flex items-center gap-3">
                        <img src="${avatarUrl}" 
                             onclick="openLightbox('${avatarUrl}')"
                             class="avatar-img w-10 h-10 rounded-full border border-slate-200 bg-white object-cover" 
                             loading="lazy" 
                             onerror="this.src='https://ui-avatars.com/api/?name=${u}'">
                        <a href="${info.href}" target="_blank" class="font-bold hover:text-blue-600 transition ${info.status === 'unfollowed' ? 'status-unfollowed-text text-red-700' : 'text-slate-800'}">
                            ${u}
                        </a>
                    </td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-lg font-black text-[10px] tracking-widest ${
                            info.status === 'new' ? 'bg-emerald-600 text-white' : 
                            (info.status === 'unfollowed' ? 'bg-rose-600 text-white' : 'bg-slate-200 text-slate-500')
                        }">
                            ${info.status.toUpperCase()}
                        </span>
                    </td>
                    <td class="p-4 font-mono text-[11px] leading-relaxed">
                        <div class="text-emerald-600 font-bold">Add：${followTime}</div>
                        <div class="${info.status === 'unfollowed' ? 'text-rose-600 font-bold' : 'text-slate-300'}">Del：${updateTime}</div>
                    </td>
                    <td class="p-4 text-center">
                        <div class="flex justify-center gap-2">
                            <a href="${storyUrl}" target="_blank" title="匿名限動" class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-600 hover:bg-pink-600 hover:text-white transition shadow-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </a>
                            <a href="${avatarUrl}" target="_blank" title="下載/查看大圖" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 hover:bg-blue-600 hover:text-white transition shadow-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            </a>
                        </div>
                    </td>
                    <td class="p-4 text-slate-400 italic text-xs">
                        ${info.note || ''}
                    </td>
                `;
                body.appendChild(tr);
            });

            document.getElementById('activeCount').innerText = activeCount;
            document.getElementById('lostCount').innerText = lostCount;
        }

        // --- 備份命名規則更動 ---
        function exportJSON() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const dateStr = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}`;
            const fileName = `IG_Tool_Backup_${dateStr}.json`;

            const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            a.click();
        }

        function importBackup(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => { 
                try {
                    db = JSON.parse(e.target.result); 
                    save(); 
                    showMsg("✅ 備份載入成功！", "ok");
                } catch(err) {
                    showMsg("❌ 檔案錯誤。", "err");
                }
            };
            reader.readAsText(file);
        }

        function clearAll() { if (confirm("確定清除緩存？")) { db = {}; save(); } }

        render();
        updateLocalStatus();
    </script>
</body>
</html>
